server:
  port: 13000

eureka:
  instance:
    prefer-ip-address: true
    instance-id: "${spring.cloud.client.ip-address}:${server.port}"
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
  client:
    service-url:
      defaultZone: "http://eurekaService19000:19000/eureka/, http://eurekaService19001:19001/eureka/, http://eurekaService19002:19002/eureka/"

spring:
  application:
    name: "gateway-server"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: consumer-service-route
              uri: lb://consumer-service
              predicates:
                - Path=/consumer/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: gateway-breaker
                    fallbackUri: forward:/fallback
            - id: provider-service-route
              uri: lb://provider-service
              predicates:
                - Path=/provider/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: gateway-breaker
                    fallbackUri: forward:/fallback
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: false
                maxAge: 3600

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      gateway-breaker:
        base-config: default
  ratelimiter:
    configs:
      default:
        limit-refresh-period: 2s
        limit-for-period: 5
        timeout-duration: 0s
    instances:
      gateway-ratelimiter:
        base-config: default

